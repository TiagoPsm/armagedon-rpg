name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp ficha.html _site/
          cp mesa.html _site/
          cp regras.html _site/
          cp .nojekyll _site/
          cp logo-rpg-site.jpg _site/
          cp logo-rpg-armagedon.png _site/
          cp "Logo app.jpg" _site/
          cp favicon.ico _site/
          cp favicon.png _site/
          cp apple-touch-icon.png _site/
          cp -R assets _site/assets
          cp -R css _site/css
          cp -R js _site/js
          if [ -d data ]; then cp -R data _site/data; fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
